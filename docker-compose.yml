# Optional external services for CortexOS development.
#
# CortexOS uses SQLite by default, which is bundled via rusqlite and requires
# no external database service. This file is provided for contributors who
# want to test against PostgreSQL or use Redis for session caching.
#
# Usage: docker compose up -d [service]
#
# NOTE: These services are NOT required for normal development. The default
# SQLite backend works without Docker.

services:
